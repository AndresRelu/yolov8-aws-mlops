<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KITTI YOLOv8 Camera</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">KITTI MLOps</p>
          <h1>YOLOv8 Camera</h1>
        </div>
        <div id="status" class="status" role="status">Idle</div>
      </header>

      <section class="control-strip" aria-label="Controles">
        <label>
          <span>API URL</span>
          <input id="apiBaseUrl" type="url" autocomplete="off" spellcheck="false" />
        </label>
        <label>
          <span>API key</span>
          <input id="apiKey" type="password" autocomplete="off" spellcheck="false" />
        </label>
        <label class="confidence-control">
          <span>Confianza <output id="confidenceValue">0.70</output></span>
          <input id="confidence" type="range" min="0" max="1" step="0.05" value="0.7" />
        </label>
        <button id="startCamera" type="button">Camara</button>
        <button id="checkHealth" type="button">Health</button>
        <button id="predict" type="button" disabled>Predict</button>
      </section>

      <section class="workspace">
        <div class="camera-stage">
          <video id="video" autoplay muted playsinline></video>
          <canvas id="overlay"></canvas>
          <canvas id="capture" hidden></canvas>
        </div>

        <aside class="results-panel">
          <div class="metric-row">
            <span>Endpoint</span>
            <strong id="endpointStatus">Unknown</strong>
          </div>
          <div class="metric-row">
            <span>Detecciones</span>
            <strong id="detectionCount">0</strong>
          </div>
          <ul id="detections" class="detections" aria-label="Detecciones"></ul>
          <pre id="rawResponse" class="raw-response">{}</pre>
        </aside>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
